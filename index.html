<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Sport Live Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#050816;
  color:white;
}

/* ANIMATION INTRO */
.intro{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  animation: fadeIn 1.5s ease-in-out;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(1.1);}
  to{opacity:1; transform:scale(1);}
}

.title{
  font-size:32px;
  font-weight:bold;
  background:linear-gradient(90deg,#00c6ff,#0072ff,#ff00cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{filter:drop-shadow(0 0 5px #00c6ff);}
  to{filter:drop-shadow(0 0 20px #ff00cc);}
}

.subtitle{
  margin-top:10px;
  color:#aaa;
}

/* LIGUES */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:20px;
  width:80%;
}

.btn{
  padding:15px;
  border:none;
  border-radius:15px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

.l1{background:#2563eb;}
.pl{background:#10b981;}
.ll{background:#f97316;}
.bu{background:#ef4444;}
.champ{background:#a855f7;}
.saudi{background:#facc15; color:black;}
.portugal{background:#06b6d4;}
.holland{background:#22c55e;}

/* APP */
.app{
  display:none;
  padding:10px;
}

.topbar{
  text-align:center;
  font-size:20px;
  padding:10px;
  color:#38bdf8;
}

/* LANG */
.langs{
  display:flex;
  justify-content:center;
  gap:5px;
  margin:10px;
}

.langs button{
  background:#111827;
  border:none;
  padding:5px 8px;
  color:white;
  border-radius:10px;
}

/* MATCH */
.card{
  background:#111827;
  margin:10px;
  padding:12px;
  border-radius:15px;
  border-left:4px solid #38bdf8;
}

.star{
  float:right;
  color:#facc15;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="intro">

  <div class="title">⚽ SPORT LIVE PRO</div>
  <div class="subtitle">CHOISISSEZ VOTRE LIGUE</div>

  <div class="grid">
    <button class="btn l1" onclick="start('Ligue 1')">LIGUE 1</button>
    <button class="btn pl" onclick="start('Premier League')">PREMIER LEAGUE</button>
    <button class="btn ll" onclick="start('La Liga')">LA LIGA</button>
    <button class="btn bu" onclick="start('Bundesliga')">BUNDESLIGA</button>
    <button class="btn champ" onclick="start('Champions League')">CHAMPIONS</button>
    <button class="btn saudi" onclick="start('Saudi')">SAOUDI</button>
    <button class="btn portugal" onclick="start('Portugal')">PORTUGAL</button>
    <button class="btn holland" onclick="start('Netherlands')">PAYS-BAS</button>
  </div>

</div>

<!-- APP -->
<div id="app" class="app">

<div class="topbar">⚽ SPORT LIVE</div>

<div class="langs">
<button>🇫🇷</button>
<button>🇺🇸</button>
<button>🇪🇸</button>
<button>🇵🇹</button>
<button>🇩🇪</button>
<button>🇸🇦</button>
</div>

<div id="matches"></div>

</div>

<script>

let selectedLeague="";

const matches=[
  {league:"Premier League",home:"Arsenal",away:"Chelsea",time:"21:00"},
  {league:"Premier League",home:"Man City",away:"Liverpool",time:"18:30"},
  {league:"Ligue 1",home:"PSG",away:"Marseille",time:"20:45"},
  {league:"La Liga",home:"Real Madrid",away:"Barcelona",time:"21:00"},
  {league:"Bundesliga",home:"Bayern",away:"Dortmund",time:"18:30"},
  {league:"Champions League",home:"PSG",away:"Real Madrid",time:"21:00"},
  {league:"Saudi",home:"Al Hilal",away:"Al Nassr",time:"20:00"},
  {league:"Portugal",home:"Benfica",away:"Porto",time:"22:00"},
  {league:"Netherlands",home:"Ajax",away:"PSV",time:"16:45"}
];

function start(league){
  selectedLeague=league;

  document.getElementById("intro").style.display="none";
  document.getElementById("app").style.display="block";

  render();
}

function render(){
  const box=document.getElementById("matches");
  box.innerHTML="";

  matches.forEach(m=>{

    if(!m.league.includes(selectedLeague))return;

    box.innerHTML+=`
      <div class="card">
        🏆 ${m.league}
        <span class="star">⭐</span><br><br>

        ⚽ ${m.home} vs ${m.away}<br>
        ⏰ ${m.time}
      </div>
    `;
  });
}

</script>

</body>
</html>
